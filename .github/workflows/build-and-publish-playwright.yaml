name: Build and publish playwright image

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & push docker image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/xima-media/playwright

      - name: Read Playwright version from package.json
        id: playwright_version
        run: |
          VERSION=$(jq -r '.devDependencies["@playwright/test"] | sub("^[^0-9]*"; "")' ./playwright/package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and publish docker image
        uses: docker/build-push-action@v5
        with:
          context: ./playwright
          push: true
          tags: ghcr.io/xima-media/playwright:${{ steps.playwright_version.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
